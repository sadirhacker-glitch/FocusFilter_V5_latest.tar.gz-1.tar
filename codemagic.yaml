workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_V5.tar.gz-2.tar
      - name: Build APK
        script: |
          cd FocusFilter
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - FocusFilter/app/build/outputs/apk/debug/*.apk
