workflows:
  android-build:
    name: Build FocusFilter APK
    environment:
      java: 17
    scripts:
      - name: Unpack project
        script: |
          tar -xf FocusFilter_V5.tar.gz-2.tar
      - name: Generate gradlew
        script: |
          cd FocusFilter
          gradle wrapper
          chmod +x gradlew
      - name: Build APK with log
        script: |
          cd FocusFilter
          ./gradlew assembleDebug --stacktrace --info > build_log.txt 2>&1
          cat build_log.txt
    artifacts:
      - FocusFilter/build_log.txt
      - FocusFilter/app/build/outputs/apk/debug/*.apk
